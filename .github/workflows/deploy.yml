name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Rebuild on any source file change across all three sites
      - 'cv/src/**'
      - 'cv/public/**'
      - 'cv/package*.json'
      - 'cv/next.config.js'
      - 'cv/tailwind.config.ts'
      - 'cv/tsconfig.json'
      - 'blog/posts/**'
      - 'neil/src/**'
      - 'neil/public/**'
      - 'neil/package*.json'
      - 'neil/next.config.js'
      - 'elportugues/src/**'
      - 'elportugues/public/**'
      - 'elportugues/package*.json'
      - 'elportugues/next.config.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to push built files back to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so rsync --delete works correctly

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cv/package-lock.json

      # ── CV Site ──────────────────────────────────────────────────────────
      - name: Install CV dependencies
        working-directory: cv
        run: npm ci

      - name: Build CV site (static export)
        working-directory: cv
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync CV build output to repository root
        run: |
          rsync -a --delete cv/out/ . \
            --exclude cv \
            --exclude neil \
            --exclude elportugues-site \
            --exclude neil-site \
            --exclude elportugues \
            --exclude assets \
            --exclude tasks \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .nojekyll \
            --exclude .prettierignore \
            --exclude .prettierrc \
            --exclude LICENSE \
            --exclude README.md \
            --exclude robots.txt \
            --exclude sitemap.xml \
            --exclude humans.txt \
            --exclude favicon.ico \
            --exclude blog.html \
            --exclude consulting.html \
            --exclude recursos.html \
            --exclude elportugues.html \
            --exclude neil.html \
            --exclude ing_req_game.html \
            --exclude package.json \
            --exclude package-lock.json \
            --exclude scripts

      # ── Neil Site ─────────────────────────────────────────────────────────
      - name: Install Neil dependencies
        working-directory: neil
        run: npm ci

      - name: Build Neil site (static export)
        working-directory: neil
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_N8N_CONTACT_WEBHOOK: ${{ secrets.NEXT_PUBLIC_N8N_NEIL_CONTACT_WEBHOOK }}
          NEXT_PUBLIC_N8N_QUOTE_WEBHOOK: ${{ secrets.NEXT_PUBLIC_N8N_NEIL_QUOTE_WEBHOOK }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Sync Neil build output to neil-site/
        run: rsync -a --delete neil/out/ neil-site/

      # ── El Portugués Site ─────────────────────────────────────────────────
      - name: Install El Portugués dependencies
        working-directory: elportugues
        run: npm ci

      - name: Build El Portugués site (static export)
        working-directory: elportugues
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_N8N_CONTACT_WEBHOOK: ${{ secrets.NEXT_PUBLIC_N8N_EP_CONTACT_WEBHOOK }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Sync El Portugués build output to elportugues-site/
        run: rsync -a --delete elportugues/out/ elportugues-site/

      # ── Commit & Push ─────────────────────────────────────────────────────
      - name: Commit and push built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: rebuild all sites [skip ci]"
          git push
