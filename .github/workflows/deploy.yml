name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Rebuild on any source file change across all three sites
      - 'cv/src/**'
      - 'cv/public/**'
      - 'cv/package*.json'
      - 'cv/next.config.js'
      - 'cv/tailwind.config.ts'
      - 'cv/tsconfig.json'
      - 'blog/posts/**'
      - 'neil/src/**'
      - 'neil/public/**'
      - 'neil/package*.json'
      - 'neil/next.config.js'
      - 'elportugues/src/**'
      - 'elportugues/public/**'
      - 'elportugues/package*.json'
      - 'elportugues/next.config.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to push to gh-pages branch

jobs:
  # ── Build jobs run in parallel ─────────────────────────────────────────────

  build-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cv/package-lock.json

      - name: Install CV dependencies
        working-directory: cv
        run: npm ci

      - name: Build CV site (static export)
        working-directory: cv
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload CV build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-out
          path: cv/out/
          retention-days: 1

  build-neil:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: neil/package-lock.json

      - name: Install Neil dependencies
        working-directory: neil
        run: npm ci

      - name: Build Neil site (static export)
        working-directory: neil
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_N8N_CONTACT_WEBHOOK: ${{ secrets.NEXT_PUBLIC_N8N_NEIL_CONTACT_WEBHOOK }}
          NEXT_PUBLIC_N8N_QUOTE_WEBHOOK: ${{ secrets.NEXT_PUBLIC_N8N_NEIL_QUOTE_WEBHOOK }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Upload Neil build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neil-out
          path: neil/out/
          retention-days: 1

  build-elportugues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: elportugues/package-lock.json

      - name: Install El Portugués dependencies
        working-directory: elportugues
        run: npm ci

      - name: Build El Portugués site (static export)
        working-directory: elportugues
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_N8N_CONTACT_WEBHOOK: ${{ secrets.NEXT_PUBLIC_N8N_EP_CONTACT_WEBHOOK }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Upload El Portugués build artifact
        uses: actions/upload-artifact@v4
        with:
          name: elportugues-out
          path: elportugues/out/
          retention-days: 1

  # ── Deploy: waits for all 3 builds, merges outputs, pushes to gh-pages ─────

  deploy:
    needs: [build-cv, build-neil, build-elportugues]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (for static root files)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download CV build artifact
        uses: actions/download-artifact@v4
        with:
          name: cv-out
          path: /tmp/deploy/cv-out/

      - name: Download Neil build artifact
        uses: actions/download-artifact@v4
        with:
          name: neil-out
          path: /tmp/deploy/neil-out/

      - name: Download El Portugués build artifact
        uses: actions/download-artifact@v4
        with:
          name: elportugues-out
          path: /tmp/deploy/elportugues-out/

      - name: Assemble final deploy directory
        run: |
          DEPLOY=/tmp/deploy/site

          # 1. Start with CV output as the root (blog/, _next/, index.html, etc.)
          rsync -a /tmp/deploy/cv-out/ $DEPLOY/

          # 2. Add neil-site/ subdirectory
          mkdir -p $DEPLOY/neil-site
          rsync -a /tmp/deploy/neil-out/ $DEPLOY/neil-site/

          # 3. Add elportugues-site/ subdirectory
          mkdir -p $DEPLOY/elportugues-site
          rsync -a /tmp/deploy/elportugues-out/ $DEPLOY/elportugues-site/

          # 4. Copy static root files from main (not generated by Next.js)
          cp -n $GITHUB_WORKSPACE/.nojekyll $DEPLOY/.nojekyll 2>/dev/null || touch $DEPLOY/.nojekyll
          for f in robots.txt sitemap.xml humans.txt favicon.ico blog.html consulting.html \
                    recursos.html elportugues.html neil.html ing_req_game.html; do
            [ -f "$GITHUB_WORKSPACE/$f" ] && cp "$GITHUB_WORKSPACE/$f" "$DEPLOY/$f" || true
          done

          # 5. Copy static assets folder
          [ -d "$GITHUB_WORKSPACE/assets" ] && rsync -a $GITHUB_WORKSPACE/assets/ $DEPLOY/assets/ || true

          echo "Deploy directory contents:"
          ls -la $DEPLOY/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy/site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'chore: deploy all sites [skip ci]'
