name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when source files change, not when built output is committed
      - 'cv/src/**'
      - 'cv/public/**'
      - 'cv/package*.json'
      - 'cv/next.config.js'
      - 'cv/tailwind.config.ts'
      - 'cv/tsconfig.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to push built files back to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so rsync --delete works correctly

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cv/package-lock.json

      - name: Install dependencies
        working-directory: cv
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: cv
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync build output to repository root
        # Mirrors what the local rsync command does.
        # Excludes source/config directories that must not be overwritten.
        run: |
          rsync -a --delete cv/out/ . \
            --exclude cv \
            --exclude neil \
            --exclude elportugues-site \
            --exclude neil-site \
            --exclude elportugues \
            --exclude assets \
            --exclude tasks \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .nojekyll \
            --exclude .prettierignore \
            --exclude .prettierrc \
            --exclude LICENSE \
            --exclude README.md \
            --exclude robots.txt \
            --exclude sitemap.xml \
            --exclude humans.txt \
            --exclude favicon.ico \
            --exclude blog.html \
            --exclude consulting.html \
            --exclude recursos.html \
            --exclude elportugues.html \
            --exclude neil.html \
            --exclude ing_req_game.html \
            --exclude package.json \
            --exclude package-lock.json \
            --exclude scripts

      - name: Commit and push built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: rebuild site [skip ci]"
          git push
